<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Popular Brands — Al Imran Fabrics</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f5f3ef;
    }

    /* ─── Section wrapper ─────────────────────────────────── */
    .brands-section {
      background: #f5f3ef;
      padding: 56px 0 64px;
      overflow: hidden;
    }

    /* ─── Header ──────────────────────────────────────────── */
    .brands-header {
      text-align: center;
      margin-bottom: 44px;
      padding: 0 24px;
    }

    .brands-eyebrow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 10px;
    }
    .brands-eyebrow .line {
      width: 48px;
      height: 1px;
      background: #C9A84C;
    }
    .brands-eyebrow span {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #C9A84C;
    }

    .brands-title {
      font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 700;
      color: #2C2C2C;
      line-height: 1.2;
    }

    /* ─── Marquee track ───────────────────────────────────── */
    .brands-mask {
      -webkit-mask-image: linear-gradient(
        to right, transparent 0%, black 7%, black 93%, transparent 100%
      );
      mask-image: linear-gradient(
        to right, transparent 0%, black 7%, black 93%, transparent 100%
      );
      overflow: hidden;
    }

    .brands-track {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 16px 40px;
      width: max-content;
      animation: brandScroll 34s linear infinite;
    }
    .brands-track:hover { animation-play-state: paused; }

    @keyframes brandScroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ─── Individual brand card ───────────────────────────── */
    .brand-card {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      cursor: pointer;
      -webkit-user-drag: none;
      user-select: none;
    }

    .brand-icon {
      position: relative;
      width: 120px;
      height: 80px;
      background: #ffffff;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 16px;
      transition: transform 0.18s ease-out, box-shadow 0.18s ease-out;
      box-shadow:
        0 2px 6px  rgba(0,0,0,0.07),
        0 6px 16px rgba(0,0,0,0.06),
        inset 0 1px 0 rgba(255,255,255,0.9);
      border: 1px solid rgba(0,0,0,0.05);
      will-change: transform;
    }
    .brand-icon:hover {
      transform: translateY(-5px) scale(1.04);
      box-shadow:
        0 8px 20px  rgba(0,0,0,0.12),
        0 20px 40px rgba(0,0,0,0.09),
        inset 0 1px 0 rgba(255,255,255,0.9);
    }

    /* Top-gloss sheen */
    .brand-icon::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0)    55%
      );
      pointer-events: none;
    }

    .brand-icon img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      -webkit-user-drag: none;
    }

    /* Text-only fallback icon (for brands without loadable logos) */
    .brand-icon.text-icon {
      background: linear-gradient(150deg, var(--g1), var(--g2));
      flex-direction: column;
      gap: 2px;
    }
    .brand-icon.text-icon .brand-mono {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      font-weight: 700;
      color: rgba(255,255,255,0.95);
      line-height: 1;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 4px rgba(0,0,0,0.25);
      position: relative;
      z-index: 1;
    }
    .brand-icon.text-icon .brand-sub {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      position: relative;
      z-index: 1;
    }
    .brand-icon.text-icon::after {
      border-radius: 16px;
    }

    .brand-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(44,44,44,0.50);
      text-align: center;
      max-width: 120px;
    }

    /* ─── Responsive: smaller cards on mobile ─────────────── */
    @media (max-width: 640px) {
      .brand-icon {
        width: 96px;
        height: 64px;
        padding: 10px 12px;
        border-radius: 14px;
      }
      .brands-track { gap: 14px; padding: 12px 24px; }
    }
  </style>
</head>
<body>

<section class="brands-section">

  <!-- Header -->
  <div class="brands-header">
    <div class="brands-eyebrow">
      <span class="line"></span>
      <span>Shop by Brand</span>
      <span class="line"></span>
    </div>
    <h2 class="brands-title">Popular Brands</h2>
  </div>

  <!-- Marquee -->
  <div class="brands-mask">
    <div class="brands-track" id="brandsTrack">

      <!-- ── Khaadi ── -->
      <a class="brand-card" href="/collections/khaadi" title="Khaadi">
        <div class="brand-icon">
          <img
            src="https://us.khaadi.com/on/demandware.static/-/Library-Sites-KhaadiSharedLibrary/default/dwb33579b0/images/logo/logo.svg"
            alt="Khaadi"
            onerror="this.parentElement.outerHTML=fallbackIcon('KH','#1B6B3A','#0A3D20','Khaadi')"
          />
        </div>
        <span class="brand-label">Khaadi</span>
      </a>

      <!-- ── J. Junaid Jamshed ── -->
      <a class="brand-card" href="/collections/j-junaid" title="J. Junaid Jamshed">
        <div class="brand-icon">
          <img
            src="https://us.junaidjamshed.com/cdn/shop/files/Logo-001_200x.png?v=1643008368"
            alt="J. Junaid Jamshed"
            onerror="this.parentElement.outerHTML=fallbackIcon('J.','#1E3A8A','#0C1350','J.')"
          />
        </div>
        <span class="brand-label">J.</span>
      </a>

      <!-- ── Sana Safinaz ── -->
      <a class="brand-card" href="/collections/sanasafinaz" title="Sana Safinaz">
        <div class="brand-icon">
          <img
            src="https://sanasafinaz.com/cdn/shop/files/Logo_300x.webp?v=1748932269"
            alt="Sana Safinaz"
            onerror="this.parentElement.outerHTML=fallbackIcon('SS','#6B2FA0','#3A0D6B','Sana Safinaz')"
          />
        </div>
        <span class="brand-label">Sana Safinaz</span>
      </a>

      <!-- ── Nishat Linen ── -->
      <a class="brand-card" href="/collections/nishat" title="Nishat Linen">
        <div class="brand-icon">
          <img
            src="https://nishat.net/images/sampledata/site-logo.png"
            alt="Nishat Linen"
            onerror="this.parentElement.outerHTML=fallbackIcon('NL','#1E3A8A','#0C1350','Nishat')"
          />
        </div>
        <span class="brand-label">Nishat Linen</span>
      </a>

      <!-- ── Gul Ahmed ── -->
      <a class="brand-card" href="/collections/gul-ahmed" title="Gul Ahmed">
        <div class="brand-icon">
          <img
            src="https://www.gulahmedshop.com/cdn/shop/files/logo_150x.svg?v=1758024576"
            alt="Gul Ahmed"
            onerror="this.parentElement.outerHTML=fallbackIcon('GA','#1B6B3A','#0A3D20','Gul Ahmed')"
          />
        </div>
        <span class="brand-label">Gul Ahmed</span>
      </a>

      <!-- ── Al-Karam Studio ── -->
      <a class="brand-card" href="/collections/al-karam" title="Al-Karam Studio">
        <div class="brand-icon text-icon" style="--g1:#C8780A;--g2:#7A3A00;">
          <span class="brand-mono">AK</span>
          <span class="brand-sub">Alkaram</span>
        </div>
        <span class="brand-label">Al-Karam Studio</span>
      </a>

      <!-- ── MTJ ── -->
      <a class="brand-card" href="/collections/mtj" title="MTJ">
        <div class="brand-icon text-icon" style="--g1:#3A3A3A;--g2:#111111;">
          <span class="brand-mono">MTJ</span>
          <span class="brand-sub">Fashion</span>
        </div>
        <span class="brand-label">MTJ</span>
      </a>

      <!-- ── Sapphire ── -->
      <a class="brand-card" href="/collections/sapphire" title="Sapphire">
        <div class="brand-icon text-icon" style="--g1:#0369A1;--g2:#0A2040;">
          <span class="brand-mono">S</span>
          <span class="brand-sub">Sapphire</span>
        </div>
        <span class="brand-label">Sapphire</span>
      </a>

    </div><!-- /.brands-track -->
  </div><!-- /.brands-mask -->

</section>

<script>
  /* ── Duplicate track for seamless infinite loop ── */
  const track = document.getElementById('brandsTrack');
  const clone  = track.innerHTML;
  track.innerHTML += clone;

  /* ── Fallback icon builder (called by onerror) ── */
  function fallbackIcon(initials, g1, g2, label) {
    return `<div class="brand-icon text-icon" style="--g1:${g1};--g2:${g2};">
              <span class="brand-mono">${initials}</span>
              <span class="brand-sub">${label}</span>
            </div>`;
  }

  /* ── Per-card 3-D tilt on mouse move ── */
  document.querySelectorAll('.brand-icon').forEach(card => {
    card.addEventListener('mousemove', e => {
      const r  = card.getBoundingClientRect();
      const rx = (((e.clientY - r.top)  / r.height) - 0.5) * -22;
      const ry = (((e.clientX - r.left) / r.width)  - 0.5) *  22;
      card.style.transform = `perspective(500px) rotateX(${rx}deg) rotateY(${ry}deg) translateY(-5px) scale(1.06)`;
    });
    card.addEventListener('mouseleave', () => {
      card.style.transform = '';
    });
  });
</script>

</body>
</html>
